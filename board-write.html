<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>게시글 작성 | A1 Swedish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">A1 <span>Swedish</span></a>
      <button class="nav-toggle" aria-label="메뉴 열기" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav>
        <ul class="nav-main">
          <li><a href="board.html" class="active">게시판</a></li>
          <li><a href="blog.html">블로그</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="page-hero">
    <div class="container">
      <p class="section-label">Write</p>
      <h1>게시글 작성</h1>
      <p>예약 문의·후기·질문을 남겨 주세요.</p>
    </div>
  </section>

  <section class="section" style="padding-top: 0;">
    <div class="container">
      <form id="board-write-form" class="write-form">
        <div class="form-group">
          <label for="title">제목 *</label>
          <input type="text" id="title" name="title" required placeholder="제목을 입력하세요" />
        </div>
        <div class="form-group">
          <label for="author">작성자</label>
          <input type="text" id="author" name="author" placeholder="이름 (미입력 시 익명)" />
        </div>
        <div class="form-group">
          <label for="content">내용 *</label>
          <textarea id="content" name="content" required placeholder="내용을 입력하세요"></textarea>
        </div>
        <div class="form-actions">
          <a href="board.html" class="btn btn-ghost">취소</a>
          <a href="admin.html" class="btn btn-outline btn-sm">서버에 올리기</a>
          <button type="submit" class="btn btn-primary">등록하기</button>
        </div>
      </form>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <span>&copy; 2026 A1 Swedish</span>
      </div>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/main.js"></script>
  <script src="js/board.js"></script>
  <script>
    whenDataReady(initBoardWriteForm);
  </script>
</body>
</html>
